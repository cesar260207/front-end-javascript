<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usuario</title>
</head>
<body>

  <h2>Dashboard Usuario</h2>
  <p id="nombre"></p>

  <button onclick="logout()">Cerrar sesión</button>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
      window.location.href = "index.html";
    }

    document.getElementById("nombre").textContent = "Bienvenido: " + user.user;

    function logout() {
      localStorage.removeItem("user");
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
