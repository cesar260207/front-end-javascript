<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
}

.navbar {
  background: #1e293b;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

button {
  background: #ef4444;
  border: none;
  padding: 8px 15px;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

.container {
  text-align: center;
  margin-top: 50px;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 30px;
}

.card {
  background: white;
  color: #1e293b;
  padding: 20px;
  width: 250px;
  border-radius: 10px;
}

.card button {
  background: #f59e0b;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="navbar">
  <span>⚙️ Admin</span>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<div class="container">
  <h2>Dashboard Admin</h2>
  <p id="nombre"></p>

  <div class="cards">
    <div class="card">
      <h3>👤 Usuarios</h3>
      <p>Gestionar cuentas</p>
      <button>Administrar</button>
    </div>

    <div class="card">
      <h3>📊 Estadísticas</h3>
      <p>Ver datos del sistema</p>
      <button>Ver</button>
    </div>

    <div class="card">
      <h3>🔐 Seguridad</h3>
      <p>Control de accesos</p>
      <button>Configurar</button>
    </div>
  </div>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "index.html";
document.getElementById("nombre").textContent = "Bienvenido: " + user.user;

function logout() {
  localStorage.removeItem("user");
  window.location.href = "index.html";
}
</script>

</body>
</html>
